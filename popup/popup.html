<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InfoBlend</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <header>
    <div class="header-left">
      <img class="logo" src="../icons/icon48.png" alt="InfoBlend" width="34" height="34">
      <div>
        <div class="wordmark">Info<em>Blend</em></div>
        <div class="tagline">Double-click any word</div>
      </div>
    </div>
    <div class="status">
      <span class="status-dot"></span>
    </div>
  </header>

  <!-- Hero action -->
  <button id="summarizeBtn" class="hero-btn">
    <div class="hero-content">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
      </svg>
      <span>Summarize this page</span>
    </div>
    <kbd>Ctrl+K</kbd>
  </button>

  <main>
    <!-- Toggle -->
    <label class="setting-row">
      <div class="setting-info">
        <span class="setting-label">Auto-definitions</span>
        <span class="setting-hint">Double-click a word to see its meaning</span>
      </div>
      <div class="toggle">
        <input type="checkbox" id="definitionsEnabled" checked>
        <span class="toggle-track"></span>
      </div>
    </label>

    <!-- AI Config (collapsible) -->
    <details class="config-panel">
      <summary class="config-header">
        <span>AI Engine</span>
        <span class="config-badge">optional</span>
      </summary>
      <div class="config-body">
        <div class="config-grid">
          <div class="input-group">
            <label for="aiProvider">Provider</label>
            <div class="select-wrap">
              <select id="aiProvider">
                <option value="gemini">Gemini</option>
                <option value="openai">OpenAI</option>
                <option value="generic">Custom</option>
              </select>
            </div>
          </div>
          <div class="input-group">
            <label for="aiKey">API Key</label>
            <input type="password" id="aiKey" placeholder="sk-..." spellcheck="false">
          </div>
          <div class="input-group full">
            <label for="aiEndpoint">Endpoint URL</label>
            <input type="text" id="aiEndpoint" placeholder="https://api.provider.com/v1/..." spellcheck="false">
          </div>
        </div>
        <p class="config-note">Without a key, summaries use local extraction.</p>
      </div>
    </details>

    <!-- Theme -->
    <label class="setting-row">
      <span class="setting-label">Summary theme</span>
      <div class="select-wrap select-sm">
        <select id="theme">
          <option value="system" selected>Auto</option>
          <option value="dark">Dark</option>
          <option value="light">Light</option>
        </select>
      </div>
    </label>

    <button id="saveBtn" class="save-btn">Save settings</button>
  </main>

  <footer>
    <span>InfoBlend</span>
    <span>v3.0.0</span>
  </footer>

  <div id="onboardingModal" class="modal">
    <div class="modal-box">
      <img class="modal-icon" src="../icons/icon128.png" alt="InfoBlend" width="56" height="56">
      <h2 class="modal-title">Welcome to <em>InfoBlend</em></h2>
      <p class="modal-desc">Your browsing, augmented.</p>
      <ul class="modal-list">
        <li>Double-click any word for an instant definition</li>
        <li>Press <strong>Ctrl+K</strong> to summarize any page</li>
        <li>Add an AI key for smarter results</li>
      </ul>
      <button id="closeOnboarding" class="modal-cta">Get started</button>
    </div>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
